name: Docker Build And Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: local/verihogg-lint:${{ github.sha }}
          outputs: type=docker,dest=/tmp/verihogg-lint-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ github.sha }}
          path: /tmp/verihogg-lint-image.tar
          if-no-files-found: error
          retention-days: 1

      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar

      - name: Build ephemeral test image
        run: |
          docker build \
            --file tests/container/Dockerfile.test \
            --build-arg BASE_IMAGE="local/verihogg-lint:${{ github.sha }}" \
            --tag verihogg-lint:test \
            .

      - name: Run all fixture tests
        run: docker run --rm verihogg-lint:test /usr/local/bin/run_tests.sh
