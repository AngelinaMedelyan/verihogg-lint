name: Push Docker Image

on:
  workflow_run:
    workflows:
      - Container Tests
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: verihogg/verihogg-lint

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  docker-push:
    runs-on: ubuntu-24.04
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Download build meta artifact from Container Tests
        uses: dawidd6/action-download-artifact@v18
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: build-meta
          path: /tmp/build-meta
          run_id: ${{ github.event.workflow_run.id }}

      - name: Read build run ID and SHA
        id: build-meta
        run: |
          BUILD_RUN_ID=$(grep '^run_id=' /tmp/build-meta/build_meta.txt | cut -d= -f2)
          HEAD_SHA=$(grep '^head_sha=' /tmp/build-meta/build_meta.txt | cut -d= -f2)
          echo "id=${BUILD_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download Docker image artifact from Docker Build
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build-meta.outputs.id }}
          name: docker-image-${{ steps.build-meta.outputs.sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          SOURCE_IMAGE="local/verihogg-lint:${{ steps.build-meta.outputs.sha }}"
          TARGET_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          TARGET_IMAGE_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.build-meta.outputs.sha }}"

          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_LATEST"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_SHA"

          docker push "$TARGET_IMAGE_LATEST"
          docker push "$TARGET_IMAGE_SHA"