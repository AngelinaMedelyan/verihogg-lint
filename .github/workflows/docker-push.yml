name: Push Docker Image

on:
  workflow_run:
    workflows:
      - Docker Build
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: verihogg/verihogg-lint

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  container-test:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
 
      - name: Download Docker image artifact
        uses: dawidd6/action-download-artifact@v18
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: docker-image-${{ github.event.workflow_run.head_sha }}
          path: /tmp
 
      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar
 
      - name: Build ephemeral test image
        run: |
          docker build \
            --file tests/container/Dockerfile.test \
            --build-arg BASE_IMAGE="local/verihogg-lint:${{ github.event.workflow_run.head_sha }}" \
            --tag verihogg-lint:test \
            .
 
      - name: Install container-structure-test
        run: |
          curl -fsSL \
            "https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64" \
            -o /usr/local/bin/container-structure-test
          chmod +x /usr/local/bin/container-structure-test
 
      - name: Run Container Structure Tests
        run: |
          container-structure-test test \
            --image verihogg-lint:test \
            --config tests/container/structure_test.yaml \
            --pull=false \
            --output text
 
      - name: Cleanup ephemeral test image
        if: always()
        run: docker rmi verihogg-lint:test || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [container-test]
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Download Docker image artifact from Docker Build workflow
        uses: dawidd6/action-download-artifact@v18
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: docker-image-${{ github.event.workflow_run.head_sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          SOURCE_IMAGE="local/verihogg-lint:${{ github.event.workflow_run.head_sha }}"
          TARGET_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          TARGET_IMAGE_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}"

          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_LATEST"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_SHA"

          docker push "$TARGET_IMAGE_LATEST"
          docker push "$TARGET_IMAGE_SHA"
