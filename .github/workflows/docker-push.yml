name: Push Docker Image

on:
  workflow_run:
    workflows:
      - Container Tests
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: verihogg/verihogg-lint

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  docker-push:
    runs-on: ubuntu-24.04
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Download Docker image artifact from Container Test workflow
        uses: dawidd6/action-download-artifact@v18
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: docker-image-${{ github.event.workflow_run.head_sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          SOURCE_IMAGE="local/verihogg-lint:${{ github.event.workflow_run.head_sha }}"
          TARGET_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          TARGET_IMAGE_SHA="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}"

          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_LATEST"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE_SHA"

          docker push "$TARGET_IMAGE_LATEST"
          docker push "$TARGET_IMAGE_SHA"
