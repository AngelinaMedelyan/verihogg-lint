name: Container Tests

on:
  workflow_run:
    workflows:
      - Docker Build
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  container-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Docker image artifact from Docker Build
        uses: actions/download-artifact@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: docker-image-${{ github.event.workflow_run.head_sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/verihogg-lint-image.tar

      - name: Build ephemeral test image
        run: |
          docker build \
            --file tests/container/Dockerfile.test \
            --build-arg BASE_IMAGE="local/verihogg-lint:${{ github.event.workflow_run.head_sha }}" \
            --tag verihogg-lint:test \
            .

      - name: Run all fixture tests
        run: docker run --rm verihogg-lint:test /usr/local/bin/run_tests.sh

      - name: Re-upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ github.event.workflow_run.head_sha }}
          path: /tmp/verihogg-lint-image.tar
          retention-days: 1
